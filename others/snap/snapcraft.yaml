name: floppy-warriors
base: core22
version: '1.0.0'
summary: <PlaceHolderShortDesc>
description: |
  <PlaceHolderLongDesc>

grade: stable
confinement: strict

architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  floppy-warriors:
    command: floppy-warriors
    extensions: [gnome]
    plugs: [home, network, removable-media, unity7]

parts:
  floppy-warriors:
    plugin: dump
    source: ./builds/
    source-type: local
    stage-packages:
      - libglu1-mesa
      - libxcursor1
      - libxinerama1
      - libxrandr2
      - libxi6
      - libpulse0
    override-build: |
      craftctl build
      chmod +x $SNAPCRAFT_PART_INSTALL/floppy-warriors

layout:
  /usr/share/floppy-warriors:
    bind: $SNAP/usr/share/floppy-warriors
